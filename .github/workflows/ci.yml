name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-and-lint:
    name: test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries the graphical client (eframe/egui) links against when
      # the workspace is built. The headless simulation crates need none of these,
      # but `make test` / `make lint` build the whole workspace.
      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # The CLAUDE.md hard requirement and the Makefile's own contract: the full
      # suite must pass, and clippy must be warning-free.
      - name: Lint (cargo clippy -D warnings)
        run: make lint

      - name: Test (cargo test --workspace)
        run: make test
